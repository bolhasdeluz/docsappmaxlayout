<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Bolhas de Luz — Manutenção & Projetos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

    <div class="header">
        <div class="header-inner">
            <div>
                <div class="h-eyebrow">Terreiro · Bolhas de Luz</div>
                <div class="h-title">Manutenção & Projetos</div>
                <div class="h-sub">Obras, suprimentos e finanças</div>
            </div>
            <button id="btn-admin-toggle" class="btn-pill">Admin</button>
        </div>
    </div>

    <div class="tabs-wrap">
        <div class="tabs">
            <button class="tab active" data-tab="manut">🔧 Manutenção</button>
            <button class="tab" data-tab="suprimentos">📦 Suprimentos</button>
            <button class="tab" data-tab="financas">💰 Finanças</button>
        </div>
    </div>

    <div class="content">
        <div class="panel active" id="panel-manut">
            <div id="manut-content"><div class="load">Carregando...</div></div>
        </div>
        <div class="panel" id="panel-suprimentos">
            <div id="sup-precisamos"></div>
        </div>
        <div class="panel" id="panel-financas">
            <div id="financas-content"><div class="load">Carregando...</div></div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
